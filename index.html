<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>mrchl.com</title>
    <meta name="description" content="mrchl.com" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='black'/%3E%3Cpath d='M32 10 L52 24 L44 50 L20 50 L12 24 Z' fill='white' opacity='.92'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <main class="login">
      <form class="login-card" id="loginForm" autocomplete="off" novalidate>
        <div class="brand">
          <span class="pentagon" aria-hidden="true">
            <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M60 10 L108 45 L89 102 L31 102 L12 45 Z"
                class="pentagon-stroke"
              />
            </svg>
          </span>
          <div class="brand-text">
            <h1 class="domain">mrchl.com</h1>
            <p class="hint">Sign in</p>
          </div>
        </div>
        <div class="fields" aria-label="Login">
          <label class="field">
            <span class="label">User</span>
            <input
              class="input"
              name="user"
              inputmode="email"
              autocomplete="username"
              placeholder="user@mrchl.com"
              required
            />
          </label>
          <label class="field">
            <span class="label">Password</span>
            <input
              class="input"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </label>
          <button class="button" type="submit">Login</button>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      if (form) {
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          // Intentionally non-functional: redirect to a missing path
          // so GitHub Pages serves `404.html` as an error response.
          window.location.href = "/session";
        });
      }
    </script>
  </body>
</html>
